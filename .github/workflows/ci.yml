name: Validate plugin

# This repo is a TEMPLATE / plugin marketplace — it has no application code.
# This workflow validates the agentic-sdd plugin itself so the template stays
# installable: manifests parse, agent/command/skill frontmatter is present,
# hook scripts are valid shell, and the copy installer works.
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    name: Validate agentic-sdd plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JSON manifests parse
        run: |
          set -e
          for f in .claude-plugin/marketplace.json \
                   plugins/agentic-sdd/.claude-plugin/plugin.json \
                   plugins/agentic-sdd/hooks/hooks.json \
                   plugins/agentic-sdd/settings.template.json; do
            python3 -c "import json,sys; json.load(open('$f'))" && echo "ok  $f"
          done

      - name: YAML workflows parse
        run: |
          python3 - <<'PY'
          import glob, yaml, sys
          for f in (glob.glob('.github/workflows/*.yml') + glob.glob('templates/*.yml')
                    + glob.glob('plugins/agentic-sdd/skills/*/references/examples/*.yml')):
              yaml.safe_load(open(f)); print('ok ', f)
          PY

      - name: actionlint example pipelines
        run: |
          shopt -s nullglob
          files=(plugins/agentic-sdd/skills/*/references/examples/*.yml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No example workflows to lint."
            exit 0
          fi
          docker run --rm -v "$PWD:/repo" --workdir /repo rhysd/actionlint:1.7.7 -color "${files[@]}"

      - name: Agent / command / skill frontmatter present
        run: |
          set -e
          for f in plugins/agentic-sdd/agents/*.md \
                   plugins/agentic-sdd/commands/*.md \
                   plugins/agentic-sdd/skills/*/SKILL.md; do
            head -1 "$f" | grep -q '^---' || { echo "MISSING frontmatter: $f"; exit 1; }
          done
          echo "frontmatter ok"

      - name: Hook scripts and installer are valid shell
        run: |
          set -e
          for f in plugins/agentic-sdd/hooks/scripts/*.sh scripts/install.sh; do
            bash -n "$f" && echo "ok  $f"
          done

      - name: shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          shellcheck -S warning plugins/agentic-sdd/hooks/scripts/*.sh scripts/install.sh || true

      - name: Copy installer runs end-to-end
        run: |
          set -e
          TMP="$(mktemp -d)/app"; mkdir -p "$TMP"
          echo '{"scripts":{}}' > "$TMP/package.json"
          bash scripts/install.sh "$TMP" --with-ci
          test -f "$TMP/.claude/commands/feature.md"
          test -f "$TMP/.claude/agents/dotnet-expert.md"
          test -f "$TMP/.claude/agents/cicd-engineer.md"
          test -f "$TMP/.claude/skills/cicd-pipelines/SKILL.md"
          test -f "$TMP/.github/workflows/ci.yml"
          python3 -c "import json; json.load(open('$TMP/.claude/settings.json'))"
          echo "installer ok"
